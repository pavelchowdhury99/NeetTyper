version: '3.9'

services:
  neettyper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neettyper
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      FLASK_APP: app.py
      FLASK_HOST: "0.0.0.0"
    volumes:
      - ./resources:/app/resources
    restart: unless-stopped
    networks:
      - neettyper-network

networks:
  neettyper-network:
    driver: bridge
