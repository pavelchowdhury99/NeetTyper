<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      :root { color-scheme: light dark; }
      @media (prefers-color-scheme: light) {
        .logo-text { fill: #0969da; }
        .logo-bracket { fill: #1a7f0f; }
      }
      @media (prefers-color-scheme: dark) {
        .logo-text { fill: #58a6ff; }
        .logo-bracket { fill: #3fb950; }
      }
    </style>
  </defs>
  
  
  <!-- Monogram text NT; -->
  <g class="logo-text">
    <!-- Main text: NT; -->
    <text x="32" y="48" font-size="36" font-weight="bold" text-anchor="middle" font-family="'JetBrains Mono', monospace" fill="currentColor">NT;</text>
  </g>
</svg>
